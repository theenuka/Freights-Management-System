# ansible/inventories/jenkins/hosts.yml
# Jenkins server inventory
# server_ip is passed at runtime: -e "server_ip=<IP>"

all:
  hosts:
    jenkins_server:
      ansible_host: "{{ server_ip }}"
      ansible_user: ubuntu
      ansible_ssh_private_key_file: "{{ ssh_key_path | default('~/.ssh/freights-dev-key.pem') }}"
  vars:
    env: dev
